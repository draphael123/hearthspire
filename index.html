<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEARTHSPIRE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Alegreya:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --amber:#e8a34a; --amber-hi:#ffce7a; --amber-dim:#8a5f2a;
    --cold:#7fa8d8; --cold-dim:#3d5677;
    --parch:#e8d9be; --parch-dim:#a8946f;
    --danger:#e05545; --good:#7dc87a;
    --card-bg:#1d1710; --card-edge:#4a3a22;
  }
  *{box-sizing:border-box; margin:0; padding:0; user-select:none;}
  html,body{height:100%; overflow:hidden;}
  body{font-family:'Alegreya',Georgia,serif; color:var(--parch); background:#080604;}
  #cv{position:fixed; inset:0; width:100vw; height:100vh; display:block; image-rendering:pixelated;}
  #dom{position:fixed; inset:0; pointer-events:none; z-index:10;}
  #dom .overlay, #dom .hud, #dom .mapscreen, #dom .combat-ui, #dom .tutbox{pointer-events:auto;}
  h1,h2,h3,.font-title{font-family:'Cinzel',Georgia,serif;}
  .muted{color:var(--parch-dim);} .amber{color:var(--amber-hi);}
  .btn{
    font-family:'Cinzel',serif; font-weight:700; letter-spacing:.06em;
    background:linear-gradient(180deg,#3a2a14,#241806); color:var(--amber-hi);
    border:1px solid var(--amber-dim); border-radius:6px;
    padding:10px 22px; cursor:pointer; font-size:15px; transition:all .15s; pointer-events:auto;
  }
  .btn:hover{background:linear-gradient(180deg,#4d3719,#31200a); border-color:var(--amber); box-shadow:0 0 14px rgba(232,163,74,.3);}
  .btn:disabled{opacity:.35; cursor:default; box-shadow:none;}
  .btn.cold{color:#c7dcf5; border-color:var(--cold-dim); background:linear-gradient(180deg,#1c2a42,#101a2c);}
  .btn.cold:hover{border-color:var(--cold); box-shadow:0 0 14px rgba(127,168,216,.3);}
  .pill{display:inline-block; padding:2px 10px; border:1px solid #4a3a22; border-radius:999px; font-size:13px; background:rgba(0,0,0,.45);}

  /* ---------- HUD ---------- */
  .hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; gap:14px; padding:9px 16px;
    background:linear-gradient(180deg, rgba(4,6,12,.85), rgba(4,6,12,0)); font-size:15px;
  }
  .hud .font-title{letter-spacing:.16em; font-size:14px;}
  .hud .grow{flex:1;}
  .hud .chip{padding:3px 12px; border:1px solid #2a3a58; border-radius:999px; background:rgba(6,10,20,.7); font-size:13.5px;}
  .hud .chip.warm{border-color:#4a3a22;}
  .hud .linkish{cursor:pointer; text-decoration:underline; color:var(--parch-dim); font-size:13px;}
  .hud .linkish:hover{color:var(--parch);}

  /* ---------- map screen ---------- */
  .mapscreen{
    position:absolute; inset:0; overflow:hidden; display:flex; flex-direction:column;
    background:radial-gradient(ellipse at 50% -20%, #16233a 0%, #0c1424 45%, #05070d 100%);
  }
  .maptitle{text-align:center; padding:6px 0 0; color:#6d81a8; font-style:italic; font-size:15px;}
  .map-wrap{flex:1; overflow:auto; display:flex; flex-direction:column-reverse; align-items:center; padding:24px 0; position:relative;}
  .map-inner{position:relative; display:flex; flex-direction:column-reverse; align-items:center;}
  .map-inner svg{position:absolute; inset:0; pointer-events:none; overflow:visible;}
  .map-row{display:flex; gap:34px; margin:10px 0; align-items:center; position:relative; z-index:1;}
  .node{
    width:76px; height:76px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border:2px solid #2a3a58; background:radial-gradient(circle at 35% 30%, #142038, #0a111f); font-size:25px; transition:all .15s;
  }
  .node .nlabel{font-size:10px; font-family:'Cinzel',serif; letter-spacing:.04em; color:#6d81a8; margin-top:1px;}
  .node.current-choice{border-color:var(--amber); cursor:pointer; box-shadow:0 0 18px rgba(232,163,74,.4); animation:nodepulse 1.6s infinite alternate;}
  @keyframes nodepulse{from{box-shadow:0 0 10px rgba(232,163,74,.25);} to{box-shadow:0 0 22px rgba(232,163,74,.55);}}
  .node.current-choice:hover{transform:scale(1.13); background:#1a2440;}
  .node.done{opacity:.3; border-color:#1d2840;}
  .node.future{opacity:.55;}
  .node.beacon{border-color:var(--amber-dim); background:radial-gradient(circle at 50% 60%, #33230e, #140d04);}
  .node.bossnode{width:96px; height:96px; font-size:36px; border-color:#5a2a3a;}

  /* ---------- combat DOM layer ---------- */
  .combat-ui{position:absolute; inset:auto 0 0 0; height:236px;}
  .logline{
    position:absolute; top:-30px; left:0; right:0; text-align:center; font-size:14.5px; color:#8fa5c8; font-style:italic;
    text-shadow:0 1px 4px #000;
  }
  .orbwrap{position:absolute; left:26px; bottom:104px; text-align:center;}
  .orb{
    width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 35% 30%, #ffd98a, #b06f1e 65%, #6b3d0e);
    color:#241300; font-family:'Cinzel',serif; font-weight:900; font-size:26px;
    box-shadow:0 0 24px rgba(232,163,74,.55), inset 0 -4px 10px rgba(0,0,0,.3);
    animation:orbpulse 2.2s infinite alternate;
  }
  @keyframes orbpulse{from{box-shadow:0 0 14px rgba(232,163,74,.35);} to{box-shadow:0 0 28px rgba(232,163,74,.7);}}
  .orblabel{font-size:11px; color:var(--parch-dim); margin-top:3px; letter-spacing:.08em; font-family:'Cinzel',serif;}
  .pilewrap{position:absolute; bottom:14px; text-align:center; cursor:pointer;}
  .pilewrap.drawp{left:26px;} .pilewrap.discp{right:26px;}
  .pileicon{
    width:52px; height:66px; border-radius:7px; border:1.5px solid var(--card-edge);
    background:linear-gradient(180deg,#241b10,#160f07); display:flex; align-items:center; justify-content:center; font-size:22px;
    box-shadow:2px 2px 0 #0d0904, 4px 4px 0 #0d0904;
  }
  .pilecount{font-size:13px; color:var(--parch-dim); margin-top:3px;}
  .statuscluster{
    position:absolute; left:110px; bottom:110px; display:flex; flex-direction:column; gap:7px; font-size:13.5px;
  }
  .weightbar{width:170px; height:15px; border:1px solid #4a3a22; border-radius:8px; overflow:hidden; background:#120d06;}
  .weightbar .wfill{height:100%; background:linear-gradient(90deg,#6b4d20,#c98f3d); transition:width .25s;}
  .weightbar.full .wfill{background:linear-gradient(90deg,#8f2f24,#d05040);}
  .embers{display:flex; gap:5px; align-items:center; min-height:15px;}
  .ember{width:12px; height:12px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #ffb35c, #d1461f); box-shadow:0 0 9px rgba(255,120,40,.85); animation:flick 1.4s infinite alternate;}
  @keyframes flick{from{opacity:.7; transform:scale(.9);} to{opacity:1; transform:scale(1.08);}}
  .endturnwrap{position:absolute; right:26px; bottom:110px;}
  .btn.endturn{font-size:16px; padding:13px 26px; border-radius:10px;}

  /* ---------- hand / cards ---------- */
  .hand{
    position:absolute; left:0; right:0; bottom:6px; display:flex; justify-content:center; align-items:flex-end; height:200px;
  }
  .card{
    width:138px; height:190px; margin:0 -8px; position:relative; cursor:pointer;
    background:
      linear-gradient(180deg,#2b2013 0%, #1a1309 55%, #120c05 100%);
    border:1.5px solid var(--card-edge); border-radius:11px; padding:8px 9px;
    display:flex; flex-direction:column;
    transform:rotate(var(--r,0deg)) translateY(var(--ty,0px));
    transition:transform .16s, box-shadow .16s, border-color .16s;
    box-shadow:0 4px 14px rgba(0,0,0,.6);
  }
  .card::before{
    content:''; position:absolute; inset:3px; border:1px solid rgba(232,163,74,.14); border-radius:8px; pointer-events:none;
  }
  .card.playable{border-color:#7a5a24; box-shadow:0 4px 14px rgba(0,0,0,.6), 0 0 12px rgba(232,163,74,.28); animation:cardglow 2s infinite alternate;}
  @keyframes cardglow{from{box-shadow:0 4px 14px rgba(0,0,0,.6), 0 0 8px rgba(232,163,74,.18);} to{box-shadow:0 4px 14px rgba(0,0,0,.6), 0 0 18px rgba(232,163,74,.45);}}
  .card:hover{transform:rotate(0deg) translateY(-30px) scale(1.13); z-index:5; box-shadow:0 16px 40px rgba(0,0,0,.8), 0 0 20px rgba(232,163,74,.4);}
  .card.dealt{animation:deal .3s backwards; animation-delay:calc(var(--i,0)*70ms);}
  @keyframes deal{from{opacity:0; transform:translateY(90px) translateX(-140px) rotate(-14deg) scale(.7);} to{opacity:1;}}
  .card .cost{
    position:absolute; top:-10px; left:-10px; width:30px; height:30px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffd98a, #b06f1e 70%); color:#241300;
    font-family:'Cinzel',serif; font-weight:900; display:flex; align-items:center; justify-content:center; font-size:16px;
    border:1px solid #6b4d20; box-shadow:0 2px 6px rgba(0,0,0,.6); z-index:2;
  }
  .card .wt{
    position:absolute; top:-10px; right:-10px; min-width:30px; height:30px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #24314a, #0e1522); color:#c7dcf5; border:1px solid var(--cold-dim);
    font-family:'Cinzel',serif; font-weight:700; display:flex; align-items:center; justify-content:center; font-size:13px;
    box-shadow:0 2px 6px rgba(0,0,0,.6); z-index:2;
  }
  .card .cname{font-family:'Cinzel',serif; font-size:12.5px; font-weight:700; color:var(--amber-hi); text-align:center; margin-top:7px; letter-spacing:.02em; line-height:1.12; min-height:28px; display:flex; align-items:center; justify-content:center;}
  .card .cname.upg{color:var(--good);}
  .card .cart{
    text-align:center; font-size:31px; margin:2px 4px; border-radius:6px; padding:3px 0;
    background:radial-gradient(circle at 50% 40%, rgba(232,163,74,.16), rgba(0,0,0,.28));
    border:1px solid rgba(232,163,74,.1);
  }
  .card.skl .cart{background:radial-gradient(circle at 50% 40%, rgba(127,168,216,.16), rgba(0,0,0,.28)); border-color:rgba(127,168,216,.12);}
  .card.burden .cart{background:radial-gradient(circle at 50% 40%, rgba(120,120,120,.12), rgba(0,0,0,.3)); border-color:rgba(120,120,120,.15);}
  .card .ctext{font-size:12px; text-align:center; color:var(--parch); line-height:1.32; flex:1; display:flex; align-items:center; justify-content:center;}
  .card .ctext .live{color:var(--amber-hi); font-weight:700;}
  .card .ctype{font-size:9.5px; text-align:center; color:#5c4c34; font-style:italic; letter-spacing:.06em;}
  .card.unaffordable{opacity:.55; filter:saturate(.6);}
  .card.unplayable-card{opacity:.6; filter:saturate(.35);}
  .card.selected{border-color:var(--danger); transform:rotate(0) translateY(-30px) scale(1.1); z-index:5;}
  .card.mini{width:114px; height:158px; margin:0; cursor:default;}
  .card.mini .cart{font-size:24px;}
  .card.mini:hover{transform:none; box-shadow:0 4px 14px rgba(0,0,0,.6);}
  .card.pickable{cursor:pointer;}
  .card.pickable:hover{transform:translateY(-9px) scale(1.05); box-shadow:0 0 18px rgba(232,163,74,.4); z-index:5;}
  .flycard{position:fixed; z-index:60; pointer-events:none; transition:all .38s cubic-bezier(.4,.1,.7,1);}

  /* ---------- panels / modals ---------- */
  .overlay{position:fixed; inset:0; background:rgba(3,4,8,.78); display:flex; align-items:center; justify-content:center; z-index:40;}
  .panel{
    background:linear-gradient(180deg,#1c150a,#0f0a04); border:1px solid var(--amber-dim); border-radius:14px;
    padding:28px 36px; max-width:780px; text-align:center; box-shadow:0 0 70px rgba(0,0,0,.85), inset 0 0 40px rgba(232,163,74,.04);
    max-height:88vh; overflow:auto;
  }
  .panel.cold-panel{border-color:var(--cold-dim); background:linear-gradient(180deg,#0e1524,#080c16);}
  .panel.wide{max-width:960px;}
  .panel h2{color:var(--amber-hi); letter-spacing:.12em; font-size:25px; margin-bottom:8px;}
  .panel.cold-panel h2{color:var(--cold);}
  .panel .story{color:var(--parch-dim); font-style:italic; line-height:1.5; margin-bottom:14px; font-size:15.5px;}
  .choicerow{display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:10px;}
  .cardrow{display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:14px 0;}
  .wagonbox{display:inline-block; border:1px dashed var(--amber-dim); border-radius:10px; padding:11px 26px; margin:8px 0 14px; font-size:16.5px;}
  .bignum{font-family:'Cinzel',serif; font-size:29px; color:var(--amber-hi);}
  .dlg{display:flex; gap:18px; align-items:flex-start; text-align:left;}
  .dlg .portrait{width:96px; height:96px; border:1px solid var(--amber-dim); border-radius:9px; background:#120d06; image-rendering:pixelated; flex:none;}
  .dlg .who{font-family:'Cinzel',serif; color:var(--amber-hi); font-size:15px; letter-spacing:.08em; margin-bottom:5px;}
  .dlg .words{font-size:16px; line-height:1.5; font-style:italic; color:var(--parch);}

  /* ---------- codex ---------- */
  .codextabs{display:flex; gap:8px; justify-content:center; margin-bottom:14px;}
  .codextab{font-family:'Cinzel',serif; font-size:13px; letter-spacing:.06em; padding:7px 18px; border-radius:999px; border:1px solid #3a2c16; cursor:pointer; color:var(--parch-dim);}
  .codextab.on{border-color:var(--amber); color:var(--amber-hi); background:rgba(232,163,74,.08);}
  .codexlist{text-align:left; display:flex; flex-direction:column; gap:10px;}
  .codexentry{display:flex; gap:14px; align-items:flex-start; border:1px solid #2a2014; border-radius:9px; padding:10px 14px; background:rgba(0,0,0,.25);}
  .codexentry .cicon{font-size:26px; width:40px; text-align:center; flex:none;}
  .codexentry img{width:56px; height:56px; image-rendering:pixelated; flex:none; background:#0a0f1a; border-radius:6px; border:1px solid #22304a;}
  .codexentry .cename{font-family:'Cinzel',serif; color:var(--amber-hi); font-size:14.5px; margin-bottom:2px;}
  .codexentry .cetext{font-size:13.5px; color:var(--parch-dim); line-height:1.45;}
  .codexentry .cestat{font-size:12px; color:#6d81a8; margin-top:2px;}

  /* ---------- tutorial ---------- */
  .tutbox{
    position:fixed; z-index:70; width:330px;
    background:linear-gradient(180deg,#221a0c,#120d05); border:1.5px solid var(--amber); border-radius:11px;
    padding:15px 17px; box-shadow:0 0 40px rgba(232,163,74,.3), 0 10px 40px rgba(0,0,0,.8);
  }
  .tutbox .tstep{font-size:11px; color:var(--amber-dim); font-family:'Cinzel',serif; letter-spacing:.1em; margin-bottom:5px;}
  .tutbox .ttext{font-size:14.5px; line-height:1.5;}
  .tutbox .ttext b{color:var(--amber-hi);}
  .tutbox .btn{margin-top:11px; font-size:13px; padding:7px 16px;}
  .tutring{position:fixed; z-index:65; border:2.5px solid var(--amber); border-radius:14px; pointer-events:none; animation:nodepulse 1.2s infinite alternate; box-shadow:0 0 20px rgba(232,163,74,.4);}

  .vignette{position:fixed; inset:0; pointer-events:none; z-index:5; background:radial-gradient(ellipse at 50% 45%, transparent 55%, rgba(0,0,0,.55) 100%);}
  .hintbar{
    position:absolute; bottom:12px; left:0; right:0; text-align:center; font-size:13px; color:#7a6a4c; text-shadow:0 1px 3px #000;
    font-style:italic;
  }

  /* ---------- v1.5 visual pass ---------- */
  /* card type frames */
  .card.atkc{border-color:#7a5024;}
  .card.sklc{border-color:#3d5677;}
  .card.sklc .cost{background:radial-gradient(circle at 35% 30%, #bcd6f2, #33608f 70%); color:#08121f; border-color:#26466b;}
  .card.burdenc{border-color:#5a564c; border-style:dashed;}
  .card .cart img{width:60px; height:60px; image-rendering:pixelated; display:block; margin:0 auto;}
  .card.mini .cart img{width:44px; height:44px;}
  /* ignition glow for ember-scaling cards */
  .card.ign::after{
    content:''; position:absolute; inset:-3px; border-radius:13px; pointer-events:none;
    box-shadow:0 0 calc(6px + 20px*var(--ig,0)) rgba(255,120,30,calc(.2 + .55*var(--ig,0)));
    animation:flick 1.3s infinite alternate;
  }
  /* keyword tooltips */
  .card .tip{
    display:none; position:absolute; left:104%; bottom:0; width:210px; z-index:9;
    background:linear-gradient(180deg,#221a0c,#120d05); border:1px solid var(--amber-dim); border-radius:9px;
    padding:10px 12px; text-align:left; box-shadow:0 8px 30px rgba(0,0,0,.8); cursor:default;
  }
  .hand .card:hover .tip{display:block;}
  .hand .card:nth-last-child(-n+2) .tip{left:auto; right:104%;}
  .card .tip .kw{font-family:'Cinzel',serif; font-size:11px; color:var(--amber-hi); letter-spacing:.05em;}
  .card .tip .kd{font-size:11.5px; color:var(--parch-dim); line-height:1.35; margin:1px 0 7px;}
  .card .tip .kd:last-child{margin-bottom:0;}
  /* plank-and-nail panel frame */
  .panel{
    border:none;
    box-shadow:0 0 0 2px #1a1005, 0 0 0 9px #3f2e16, 0 0 0 11px #241505, 0 0 70px rgba(0,0,0,.9), inset 0 0 40px rgba(232,163,74,.05);
  }
  .panel::after{
    content:''; position:absolute; inset:-7px; pointer-events:none; border-radius:16px;
    background:
      radial-gradient(circle 3px at 8px 8px, #14100a 40%, #6b5836 55%, transparent 62%),
      radial-gradient(circle 3px at calc(100% - 8px) 8px, #14100a 40%, #6b5836 55%, transparent 62%),
      radial-gradient(circle 3px at 8px calc(100% - 8px), #14100a 40%, #6b5836 55%, transparent 62%),
      radial-gradient(circle 3px at calc(100% - 8px) calc(100% - 8px), #14100a 40%, #6b5836 55%, transparent 62%);
  }
  .panel{position:relative; overflow:visible;}
  .panel>*{position:relative; z-index:1;}
  .vignimg{width:100%; max-width:430px; border:1px solid #4a3a22; border-radius:8px; image-rendering:pixelated; margin:4px 0 10px; display:block; margin-left:auto; margin-right:auto;}
  .mapscreen{background:transparent;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="vignette"></div>
<div id="dom"></div>

const SPR={};
for (const key in SPRITES){
  const rows=SPRITES[key], w=rows[0].length, h=rows.length;
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const g=c.getContext('2d');
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const ch=rows[y][x]; if(ch==='.'||ch===' ') continue;
    g.fillStyle=PAL[ch]||'#f0f'; g.fillRect(x,y,1,1);
  }
  const wc=document.createElement('canvas'); wc.width=w; wc.height=h;
  const wg=wc.getContext('2d');
  wg.drawImage(c,0,0); wg.globalCompositeOperation='source-in'; wg.fillStyle='#fff'; wg.fillRect(0,0,w,h);
  SPR[key]={img:c, white:wc, w, h};
}
function drawSpr(g, key, x, y, scale, opts={}){
  const s=SPR[key]; if(!s) return;
  g.save();
  g.imageSmoothingEnabled=false;
  g.translate(x, y);
  if (opts.flip) g.scale(-1,1);
  if (opts.alpha!==undefined) g.globalAlpha=opts.alpha;
  const img=opts.white? s.white : s.img;
  const dw=s.w*scale*(opts.sqx||1), dh=s.h*scale*(opts.sqy||1);
  g.drawImage(img, -dw/2, -dh, dw, dh); // anchor: bottom-center (squash-aware)
  g.restore();
}

function cval(ci, field){
  const d=CARDS[ci.key];
  if (ci.up && d.up && d.up[field]!==undefined) return d.up[field];
  return d[field];
}
// live=true → substitute computed numbers using the current combat state
function cardText(ci, live){
  const d=CARDS[ci.key];
  if (d.fixed) return d.fixed;
  const parts=[];
  const c=run&&run.combat;
  const emb=c?c.embers:0;
  const dmg=cval(ci,'dmg'), times=cval(ci,'times');
  if (dmg!==undefined){
    let s;
    if (live && c && (d.consume&&cval(ci,'perEmberDmg') || cval(ci,'plusPerEmber'))){
      let total=dmg;
      if (d.consume&&cval(ci,'perEmberDmg')) total+=emb*cval(ci,'perEmberDmg');
      if (cval(ci,'plusPerEmber')) total+=emb*cval(ci,'plusPerEmber');
      s=`Deal <span class="live">${total}</span>`;
    } else {
      s=`Deal ${dmg}`;
      if (cval(ci,'perEmberDmg')&&d.consume) s+=` +${cval(ci,'perEmberDmg')}/Ember`;
      if (cval(ci,'plusPerEmber')) s+=` +${cval(ci,'plusPerEmber')}/Ember held`;
    }
    if (times) s+=`×${times}`;
    if (d.aoe) s+=' to ALL';
    parts.push(s+'.');
  }
  const blk=cval(ci,'block');
  if (blk!==undefined){
    let s;
    if (live && c && d.consume && cval(ci,'perEmberBlock')) s=`<span class="live">${blk+emb*cval(ci,'perEmberBlock')}</span> Block`;
    else if (cval(ci,'embersBonusBlock')) s=`${blk} Block (${blk+cval(ci,'embersBonusBlock')} with 3+ Embers)`;
    else if (cval(ci,'perEmberBlock')&&d.consume) s=`${blk} Block +${cval(ci,'perEmberBlock')}/Ember`;
    else s=`${blk} Block`;
    parts.push('Gain '+s+'.');
  }
  if (d.consume) parts.unshift('Consume all Embers:');
  if (cval(ci,'ember')) parts.push(`Kindle ${cval(ci,'ember')} Ember${cval(ci,'ember')>1?'s':''}.`);
  if (d.doubleEmbers) parts.push('Double your Embers.');
  if (cval(ci,'draw')) parts.push(`Draw ${cval(ci,'draw')}.`);
  if (cval(ci,'perEmberDraw')) parts.push('Draw 1 per Ember.');
  if (cval(ci,'weak')) parts.push(`Apply ${cval(ci,'weak')} Weak.`);
  return parts.join(' ');
}

function addFloat(x,y,txt,color,delay=0){ fx.push({kind:'float',x,y,txt,color,t0:now()+delay}); }

/* particles (world coords, drawn on whichever scene is active) */
let parts=[];
function spawnBurst(x,y,colors,n,spd,life=650,grav=0.0009){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, v=spd*(0.4+Math.random()*0.9);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-spd*0.3,c:colors[Math.floor(Math.random()*colors.length)],
      t0:now(),life:life*(0.6+Math.random()*0.8),size:1.5+Math.random()*3,grav});
  }
}
function drawParts(g){
  const t=now();
  parts=parts.filter(p=>t-p.t0<p.life);
  for(const p of parts){
    const age=t-p.t0, k=age/p.life;
    const px=p.x+p.vx*age, py=p.y+p.vy*age+p.grav*age*age*0.5;
    g.globalAlpha=1-k;
    g.fillStyle=p.c;
    g.fillRect(px-p.size/2, py-p.size/2, p.size*(1-k*0.5), p.size*(1-k*0.5));
  }
  g.globalAlpha=1;
}

  if(!iris) return;
  const w=window.innerWidth, h=window.innerHeight;
  const maxR=Math.hypot(w,h)/2+40;
  const t=now()-iris.t0;
  let r;
  if(iris.phase==='close'){
    r=maxR*(1-Math.min(1,t/IRIS_CLOSE));
    if(t>=IRIS_CLOSE){ const cb=iris.cb; iris={phase:'open', t0:now(), cb:null}; if(cb) cb(); r=0; }
  } else {
    const k=Math.min(1,t/IRIS_OPEN);
    r=maxR*(k*k);
    if(t>=IRIS_OPEN){ iris=null; return; }
  }
  g.save(); g.setTransform(window.devicePixelRatio||1,0,0,window.devicePixelRatio||1,0,0);
  g.beginPath();
  g.rect(0,0,w,h);
  g.arc(w/2,h/2,Math.max(0.01,r),0,Math.PI*2,true);
  g.fillStyle='#050302'; g.fill();
  if(r>1&&r<maxR*0.9){ g.strokeStyle='rgba(255,180,90,.5)'; g.lineWidth=3; g.beginPath(); g.arc(w/2,h/2,r,0,Math.PI*2); g.stroke(); }
  g.restore();
}

/* ================= combat engine ================= */
function startCombat(enemyKeys, nodeType){
  const enemies=enemyKeys.map(k=>{
    const d=ENEMIES[k];
    return {key:k, name:d.name, hp:d.hp, maxHp:d.hp, block:0, str:0, weak:0, turn:0, intent:d.ai(0), diedAt:0};
  });
  run.combat={nodeType, enemies, draw:shuffle(run.deck), disc:[], hand:[],
    energy:ENERGY_PER_TURN, embers:0, block:0, turn:1, over:false, busy:false, packFull:false};
  if(enemies.some(e=>ENEMIES[e.key].boss)&&nodeType!=='tutorial'){
    // boss intro: hold input while the eye opens
    const bc=run.combat;
    bc.busy=true; window.__bossIntro=now();
    setTimeout(()=>{ if(run&&run.combat===bc){ bc.busy=false; render(); } }, 2700);
  }
  ui.screen='combat'; ui.targeting=null; ui.dealt=true;
  ui.log = nodeType==='tutorial' ? '' : 'The wilds stir…';
  drawToHand();
}
function handWeight(){ return run.combat.hand.reduce((s,c)=>s+CARDS[c.key].w,0); }
function drawOne(){
  const c=run.combat;
  if(!c.draw.length){ if(!c.disc.length) return false; c.draw=shuffle(c.disc); c.disc=[]; }
  const top=c.draw[c.draw.length-1];
  if(handWeight()+CARDS[top.key].w>CAPACITY){ c.packFull=true; return false; }
  c.hand.push(c.draw.pop());
  return true;
}
function drawToHand(){ const c=run.combat; c.packFull=false; while(c.hand.length<HAND_TARGET){ if(!drawOne()) break; } }
function drawCards(n){ for(let i=0;i<n;i++){ if(!drawOne()) break; } }
function livingEnemies(){ return run.combat.enemies.filter(e=>e.hp>0); }

function playCard(iid, targetIdx){
  const c=run.combat;
  if(!c || c.over || c.busy) return;
  const idx=c.hand.findIndex(x=>x.iid===iid);
  if(idx<0) return;
  const ci=c.hand[idx];
  const d=CARDS[ci.key];
  // tutorial gate
  if(ui.tutorial){
    const st=TUT_STEPS[ui.tutorial.step];
    if(!st || !st.require || !st.require.startsWith('play:')){ nudgeTut(); return; }
    if(st.require!=='play:'+ci.key){ nudgeTut(); return; }
  }
  if(d.unplayable){ ui.log=`${d.name} weighs on you — it cannot be played.`; render(); return; }
  const cost=cval(ci,'cost');
  if(cost>c.energy){ ui.log='Not enough energy.'; render(); return; }
  const alive=livingEnemies();
  if(d.type==='atk' && !d.aoe && alive.length>1 && targetIdx===undefined){ ui.targeting=iid; render(); return; }
  let target=null;
  if(d.type==='atk' && !d.aoe){
    target=targetIdx!==undefined?c.enemies[targetIdx]:alive[0];
    if(!target||target.hp<=0) target=alive[0];
  }
  ui.targeting=null;
  c.energy-=cost;

  let spent=0;
  if(d.consume){ spent=c.embers; c.embers=0; }
  if(d.doubleEmbers) c.embers*=2;
  if(cval(ci,'ember')) c.embers+=cval(ci,'ember');

  let blk=cval(ci,'block')||0;
  if(blk){
    if(d.consume&&cval(ci,'perEmberBlock')) blk+=spent*cval(ci,'perEmberBlock');
    if(cval(ci,'embersBonusBlock')&&c.embers>=3) blk+=cval(ci,'embersBonusBlock');
    c.block+=blk;
    const pp=playerPos(); addFloat(pp.x, pp.y-140, '+'+blk+' 🛡', '#7fa8d8');
  }

  const msgs=[];
  const baseDmg=cval(ci,'dmg');
  if(baseDmg!==undefined){
    // ember-craft cards launch a bolt from the lantern; plain steel lunges in
    const isBolt=!!(d.consume||cval(ci,'ember')||cval(ci,'plusPerEmber'));
    const delay=isBolt?260:120;
    const pp=playerPos();
    if(!isBolt) fx.push({kind:'lungeP', t0:now()});
    let dmg=baseDmg;
    if(d.consume&&cval(ci,'perEmberDmg')) dmg+=spent*cval(ci,'perEmberDmg');
    if(cval(ci,'plusPerEmber')) dmg+=c.embers*cval(ci,'plusPerEmber');
    const times=cval(ci,'times')||1;
    const targets=d.aoe?alive:[target];
    for(const t of targets){
      let dealt=0;
      for(let h=0;h<times;h++){
        if(t.hp<=0) break;
        let hit=dmg;
        const absorbed=Math.min(t.block,hit); t.block-=absorbed; hit-=absorbed;
        t.hp=Math.max(0,t.hp-hit); dealt+=hit;
      }
      const ei=c.enemies.indexOf(t);
      const ep=enemyPos(ei);
      const topY=ep.y-SPR[ENEMIES[t.key].spr].h*ENEMIES[t.key].scale;
      if(isBolt) fx.push({kind:'proj', x0:pp.x+52, y0:pp.y-114, x1:ep.x, y1:topY+SPR[ENEMIES[t.key].spr].h*ENEMIES[t.key].scale/2, t0:now(), dur:delay});
      fx.push({kind:'flashE', idx:ei, t0:now()+delay});
      addFloat(ep.x, topY-14, String(dealt), '#ffce7a', delay);
      const died=t.hp<=0&&!t.diedAt;
      if(died) t.diedAt=now()+delay+120;
      const bx=ep.x, by=topY+30;
      setTimeout(()=>{
        hitstop(70);
        spawnBurst(bx, by, isBolt?EMBER_COLORS:HIT_COLORS, 10, 0.14);
        if(died) spawnBurst(bx, by+20, EMBER_COLORS, 22, 0.07, 1500, -0.00045);
      }, delay);
      msgs.push(`${dealt} to ${t.name}`);
    }
  }
  if(cval(ci,'weak')&&(target||alive[0])) (target||alive[0]).weak+=cval(ci,'weak');

  c.hand.splice(idx,1); c.disc.push(ci);
  if(cval(ci,'draw')) drawCards(cval(ci,'draw'));
  if(d.consume&&cval(ci,'perEmberDraw')) drawCards(spent*cval(ci,'perEmberDraw'));

  ui.log=`${d.name}${msgs.length?' — '+msgs.join(', '):''}${spent?` (consumed ${spent} Ember${spent>1?'s':''})`:''}`;
  if(ui.tutorial) advanceTut('play:'+ci.key);
  checkVictory();
  render();
}

function checkVictory(){
  const c=run.combat;
  if(c.over) return;
  if(livingEnemies().length===0){ c.over=true; setTimeout(winCombat, 750); }
}
function winCombat(){
  if(!run||!run.combat) return;
  const c=run.combat;
  if(c.nodeType==='tutorial'){ finishTutorialFight(); return; }
  const tier=lootTier(run.row);
  let mat=Math.round((10+Math.floor(Math.random()*5))*TIER_MULT[tier]);
  if(c.nodeType==='EL') mat+=30;
  if(c.nodeType==='BOSS') mat+=60;
  run.wagon.materials+=mat;
  if(c.nodeType==='BOSS'){ run.combat=null; extractHome(true); return; }
  if(c.nodeType==='rescueFight'){ run.combat=null; completeRescue(mat); return; }
  const pool=REWARD_POOL.concat(town.buildings.library?LIBRARY_POOL:[]);
  const picks=shuffle(pool).slice(0,3);
  withIris(()=>{
    run.combat=null;
    ui.modal={kind:'reward', mat, picks};
    ui.screen='map';
    render();
  });
}

function endTurn(){
  const c=run&&run.combat;
  if(!c||c.over||c.busy) return;
  if(ui.tutorial){ const st=TUT_STEPS[ui.tutorial.step]; if(!st||st.require!=='end'){ nudgeTut(); return; } advanceTut('end'); }
  c.busy=true;
  c.disc.push(...c.hand); c.hand=[];
  ui.log='…';
  render();
  const actors=c.enemies.filter(e=>e.hp>0);
  let i=0;
  const step=()=>{
    if(!run||!run.combat||run.combat!==c) return;
    if(i>=actors.length){ finishEnemyTurn(c); return; }
    const e=actors[i++];
    if(e.hp>0){
      // telegraph: crouch for a beat before striking
      fx.push({kind:'windup', idx:c.enemies.indexOf(e), t0:now()});
      setTimeout(()=>{
        if(!run||!run.combat||run.combat!==c) return;
        enemyAct(c,e);
        render();
        if(run.hp<=0){ c.over=true; ui.log='The lantern goes dark…'; render(); setTimeout(dieOnRoad, 900); return; }
        setTimeout(step, 340);
      }, 300);
    } else setTimeout(step, 60);
  };
  setTimeout(step, 380);
}
function enemyAct(c,e){
  const ei=c.enemies.indexOf(e);
  e.block=0;
  const it=e.intent;
  fx.push({kind:'lungeE', idx:ei, t0:now()});
  const ep=enemyPos(ei), topY=ep.y-SPR[ENEMIES[e.key].spr].h*ENEMIES[e.key].scale-14;
  if(it.blk){ e.block+=it.blk; addFloat(ep.x, topY, '+'+it.blk+' 🛡', '#7fa8d8'); }
  if(it.buff){ e.str+=it.buff; addFloat(ep.x, topY, '+'+it.buff+' Str', '#c9a35f'); }
  if(it.atk){
    const times=it.times||1;
    let total=0, absorbedTotal=0;
    for(let h=0;h<times;h++){
      let dmg=it.atk+e.str;
      if(e.weak>0) dmg=Math.floor(dmg*0.75);
      const absorbed=Math.min(c.block,dmg); c.block-=absorbed; dmg-=absorbed; absorbedTotal+=absorbed;
      run.hp=Math.max(0,run.hp-dmg); total+=dmg;
    }
    const pp=playerPos();
    fx.push({kind:'flashP', t0:now()+160});
    addFloat(pp.x, pp.y-150, String(total), total>0?'#e05545':'#7fa8d8');
    setTimeout(()=>{
      if(total>0){ hitstop(70); spawnBurst(pp.x, pp.y-80, HIT_COLORS, 8, 0.13); }
      if(absorbedTotal>0) spawnBurst(pp.x-20, pp.y-70, BLOCK_COLORS, 12, 0.16, 500); // block shatter
    }, 160);
    if(total>0) shakeT0=now()+160;
    ui.log=`${e.name} — ${it.lbl}: ${total} damage${absorbedTotal>0?` (${absorbedTotal} blocked)`:''}`;
  } else {
    ui.log=`${e.name} — ${it.lbl}`;
  }
  if(e.weak>0) e.weak--;
}
function finishEnemyTurn(c){
  for(const e of c.enemies){ if(e.hp>0){ e.turn++; e.intent=ENEMIES[e.key].ai(e.turn); } }
  c.turn++; c.energy=ENERGY_PER_TURN; c.block=0;
  drawToHand();
  ui.dealt=true;
  c.busy=false;
  ui.log='Your turn.';
  render();
}

    for(let i=0;i<c.enemies.length;i++){
      const en=c.enemies[i]; if(en.hp<=0) continue;
      const d=ENEMIES[en.key], sp=SPR[d.spr];
      const ep=enemyPos(i);
      const hw=sp.w*d.scale/2+18, hh=sp.h*d.scale+24;
      if(w.x>ep.x-hw && w.x<ep.x+hw && w.y>ep.y-hh && w.y<ep.y+14){ playCard(ui.targeting, i); return; }
    }
    ui.targeting=null; render();
  }
});
function townInteract(act){
  if(act==='gate') ui.modal={kind:'gate'};
  else if(act==='signpost') ui.modal={kind:'signpost'};
  else if(act==='board') ui.modal={kind:'board'};
  else if(act==='hearth') ui.modal={kind:'hearthflavor'};
  else if(act==='maren'){ ui.modal={kind:'dialogue', who:'Maren the Smith', spr:'maren', text:marenLine()}; }
  else if(act.startsWith('future:')) ui.modal={kind:'future', name:LOTS[act.slice(7)].name};
  else if(act.startsWith('lot:')){
    const k=act.slice(4);
    ui.modal = town.buildings[k] ? {kind:'builtflavor', lot:k} : {kind:'build', lot:k};
  }

}

/* ================= town update ================= */
function updateTown(dt){
  if(ui.modal){ player.moving=false; return; }
  let dx=0, dy=0;
  if(keys['arrowleft']||keys['a']) dx-=1;
  if(keys['arrowright']||keys['d']) dx+=1;
  if(keys['arrowup']||keys['w']) dy-=1;
  if(keys['arrowdown']||keys['s']) dy+=1;
  player.moving=!!(dx||dy);
  if(player.moving){
    const sp=0.165*dt;
    if(dx&&dy){ dx*=0.707; dy*=0.707; }
    if(Math.abs(dx)>Math.abs(dy)) player.dir=dx>0?'r':'l';
    else if(dy) player.dir=dy>0?'d':'u';
    const nx=Math.max(44, Math.min(WORLD_W-44, player.x+dx*sp));
    const ny=Math.max(80, Math.min(WORLD_H-26, player.y+dy*sp));
    const feet={x:nx-9, y:ny-14, w:18, h:12};
    let hit=false;
    for(const s of townSolids()){
      if(feet.x<s.x+s.w&&feet.x+feet.w>s.x&&feet.y<s.y+s.h&&feet.y+feet.h>s.y){ hit=true; break; }
    }
    if(!hit){ player.x=nx; player.y=ny; }
    else {
      const fx2={x:player.x-9+dx*sp, y:player.y-14, w:18, h:12}; let hx=false;
      for(const s of townSolids()) if(fx2.x<s.x+s.w&&fx2.x+fx2.w>s.x&&fx2.y<s.y+s.h&&fx2.y+fx2.h>s.y){hx=true;break;}
      if(!hx) player.x=Math.max(44,Math.min(WORLD_W-44,player.x+dx*sp));
      const fy2={x:player.x-9, y:player.y-14+dy*sp, w:18, h:12}; let hy=false;
      for(const s of townSolids()) if(fy2.x<s.x+s.w&&fy2.x+fy2.w>s.x&&fy2.y<s.y+s.h&&fy2.y+fy2.h>s.y){hy=true;break;}
      if(!hy) player.y=Math.max(80,Math.min(WORLD_H-26,player.y+dy*sp));
    }
    player.animT+=dt;
    if(player.animT>170){ player.animT=0; player.frame=1-player.frame; }
  }
  // footstep dust
  if(player.moving){
    if(!updateTown._dust||now()-updateTown._dust>150){
      updateTown._dust=now();
      parts.push({x:player.x+(Math.random()-0.5)*10, y:player.y-2, vx:(Math.random()-0.5)*0.02, vy:-0.008,
        c:'rgba(160,140,100,.7)', t0:now(), life:420, size:3, grav:0});
    }
  }
  // Maren: wander, or work the anvil once the forge stands
  if(town.villagers.smith){
    const t=now();
    const anvil={x:LOTS.forge.x+36, y:LOTS.forge.y+126};
    if(t>maren.nextMove){
      maren.nextMove=t+3200+Math.random()*3200;
      maren.working=town.buildings.forge&&Math.random()<0.55;
      if(maren.working){ maren.tx=anvil.x+16; maren.ty=anvil.y; }
      else { maren.tx=900+Math.random()*130; maren.ty=440+Math.random()*46; }
    }
    const mdx=maren.tx-maren.x, mdy=maren.ty-maren.y, md=Math.hypot(mdx,mdy);
    if(md>3){
      maren.x+=mdx/md*0.045*dt; maren.y+=mdy/md*0.045*dt;
      maren.flip=mdx<0;
      maren.animT+=dt; if(maren.animT>200){ maren.animT=0; maren.frame=1-maren.frame; }
    } else if(maren.working){
      maren.flip=true; // face the anvil
      if(!maren._spark||t-maren._spark>620){
        maren._spark=t;
        spawnBurst(anvil.x, anvil.y-16, ['#ffd98a','#fff2d8','#ff8f3c'], 7, 0.11, 460, 0.0016);
      }
    }
  }
}

const rngM=mulberry(21);

const MAP_PINES=[]; for(let i=0;i<30;i++){ const side=rngM()<0.5; MAP_PINES.push({x:side?60+rngM()*380:840+rngM()*380, y:90+rngM()*540, s:0.7+rngM()*0.9}); }
const MAP_FOG=[]; for(let ri=0;ri<MAP_ROWS.length;ri++){ const row=[]; for(let i=0;i<9;i++) row.push({dx:(rngM()-0.5)*720, r:60+rngM()*90, ph:rngM()*7}); MAP_FOG.push(row); }
const RIVER=[[980,700],[930,600],[960,500],[900,390],[940,280],[880,170],[910,60]];
function rowY(ri){ return 596-ri*58; }

function genMapPos(){

    const n=row.length;

function chosenPos(ri){

function drawInkPine(g,x,y,s){
  g.fillStyle='rgba(58,44,28,.55)';
  g.beginPath(); g.moveTo(x-9*s,y); g.lineTo(x,y-22*s); g.lineTo(x+9*s,y); g.closePath(); g.fill();
  g.fillRect(x-1.5*s,y,3*s,5*s);
}
function drawMap(t){
  if(!run||!run.mapPos) return;
  const g=ctx;
  g.save(); g.translate(viewOx,viewOy); g.scale(viewS,viewS);
  // parchment
  g.fillStyle='#c2aa7e'; g.fillRect(0,0,WORLD_W,WORLD_H);
  for(const b of PARCH_BLOTCH){ g.fillStyle=`rgba(90,70,40,${b.a})`; g.beginPath(); g.arc(b.x,b.y,b.r,0,7); g.fill(); }

  const eg=g.createRadialGradient(WORLD_W/2,WORLD_H/2,WORLD_H*0.34,WORLD_W/2,WORLD_H/2,WORLD_W*0.62);
  eg.addColorStop(0,'rgba(60,40,18,0)'); eg.addColorStop(0.82,'rgba(60,40,18,.18)'); eg.addColorStop(1,'rgba(30,18,6,.55)');
  g.fillStyle=eg; g.fillRect(0,0,WORLD_W,WORLD_H);

  for(const p of RIVER) g.lineTo(p[0],p[1]); g.stroke();

  g.beginPath(); g.moveTo(RIVER[0][0]-8,RIVER[0][1]); for(const p of RIVER) g.lineTo(p[0]-8,p[1]); g.stroke();
  // mountains along the top
  g.strokeStyle='rgba(58,44,28,.6)'; g.lineWidth=3;

  }

  for(const p of MAP_PINES) drawInkPine(g,p.x,p.y,p.s);

  g.strokeStyle='rgba(58,44,28,.5)'; g.lineWidth=2;
  g.beginPath(); g.arc(112,600,26,0,7); g.stroke();
  g.beginPath(); g.moveTo(112,570); g.lineTo(112,630); g.moveTo(82,600); g.lineTo(142,600); g.stroke();
  g.font='700 14px Cinzel,serif'; g.fillStyle='rgba(58,44,28,.7)'; g.textAlign='center'; g.fillText('N',112,562);
  // town mark
  g.fillStyle='#4a3826'; g.fillRect(TOWN_PT.x-14,TOWN_PT.y-14,28,16);
  g.beginPath(); g.moveTo(TOWN_PT.x-18,TOWN_PT.y-12); g.lineTo(TOWN_PT.x,TOWN_PT.y-26); g.lineTo(TOWN_PT.x+18,TOWN_PT.y-12); g.closePath(); g.fill();
  const tfl=1+0.2*Math.sin(t/140);
  g.fillStyle='#ff8f3c'; g.beginPath(); g.arc(TOWN_PT.x,TOWN_PT.y-32,4*tfl,0,7); g.fill();
  g.font='700 13px Cinzel,serif'; g.fillStyle='rgba(58,44,28,.85)'; g.fillText('HEARTHSPIRE',TOWN_PT.x,TOWN_PT.y+18);
  // route lines
  const seg=(a,b,solid)=>{
    g.strokeStyle=solid?'rgba(58,40,20,.85)':'rgba(58,44,28,.3)';
    g.lineWidth=solid?3.5:2; g.setLineDash(solid?[9,6]:[3,7]);
    g.beginPath(); g.moveTo(a.x,a.y); g.lineTo(b.x,b.y); g.stroke(); g.setLineDash([]);
  };
  for(const p0 of run.mapPos[0]) seg(TOWN_PT,p0,false);
  for(let ri=0;ri<MAP_ROWS.length-1;ri++) for(const a of run.mapPos[ri]) for(const b of run.mapPos[ri+1]) seg(a,b,false);
  for(let ri=0;ri<=run.row;ri++) seg(chosenPos(ri-1), chosenPos(ri), true);
  if(run.row+1<MAP_ROWS.length) for(const b of run.mapPos[run.row+1]) seg(chosenPos(run.row), b, false);
  // nodes
  for(let ri=0;ri<MAP_ROWS.length;ri++){
    for(let ni=0;ni<MAP_ROWS[ri].length;ni++){
      const type=MAP_ROWS[ri][ni], p=run.mapPos[ri][ni];
      const state=ri<=run.row?(run.chosen[ri]===type?'visited':'skipped'):(ri===run.row+1?'choice':'future');
      const bob=state==='choice'?Math.sin(t/300+ni)*3:0;
      g.globalAlpha=state==='skipped'?0.35:state==='visited'?0.6:1;
      // disc
      g.fillStyle=type==='BOSS'?'#3d2c2c':'#b59c6e';
      g.strokeStyle='rgba(58,40,20,.8)'; g.lineWidth=2.5;
      const r=type==='BOSS'?34:26;
      g.beginPath(); g.arc(p.x,p.y+bob,r,0,7); g.fill(); g.stroke();
      if(state==='choice'){
        const pu=0.5+0.5*Math.sin(t/260);

        g.beginPath(); g.arc(p.x,p.y+bob,r+6+pu*3,0,7); g.stroke();
      }
      drawSpr(g,'n_'+type,p.x,p.y+bob+16,type==='BOSS'?4.6:3.4);
      // lit beacons still burn behind you
      if(type==='B'&&state==='visited'){
        const fl=1+0.25*Math.sin(t/120+ri);
        g.fillStyle='rgba(255,140,50,.25)'; g.beginPath(); g.arc(p.x,p.y-8,20*fl,0,7); g.fill();
        g.fillStyle='#ff8f3c'; g.beginPath(); g.arc(p.x,p.y-10,5*fl,0,7); g.fill();
      }
      g.globalAlpha=1;
      g.font='700 11px Cinzel,serif'; g.fillStyle='rgba(58,40,20,.75)';
      g.fillText(NODE_META[type].label.toUpperCase(), p.x, p.y+bob+r+15);
    }
  }
  // wagon token
  const cur=chosenPos(run.row);
  if(!run.wagonTok) run.wagonTok={x:TOWN_PT.x,y:TOWN_PT.y};
  const wt=run.wagonTok;
  wt.x+=(cur.x+34-wt.x)*0.07; wt.y+=(cur.y-6-wt.y)*0.07;
  g.fillStyle='rgba(255,190,90,.18)'; g.beginPath(); g.arc(wt.x,wt.y-12,26,0,7); g.fill();
  drawSpr(g,'wagon',wt.x,wt.y,3);
  // fog of war rolls back as you advance
  for(let ri=Math.max(0,run.row+2);ri<MAP_ROWS.length;ri++){
    const depth=(ri-(run.row+2))/Math.max(1,MAP_ROWS.length-(run.row+2));
    for(const b of MAP_FOG[ri]){
      const bx2=640+b.dx+Math.sin(t/2600+b.ph)*22;
      g.fillStyle=`rgba(178,164,130,${(0.5+depth*0.34).toFixed(2)})`;
      g.beginPath(); g.ellipse(bx2,rowY(ri),b.r,b.r*0.42,0,0,7); g.fill();
    }
  }
  // the eye watches through the fog
  if(run.row+2<=8){ g.globalAlpha=0.5+0.2*Math.sin(t/700); drawSpr(g,'n_BOSS',640,rowY(8)+18,4.6); g.globalAlpha=1; }
  // darkening north
  const ng=g.createLinearGradient(0,0,0,WORLD_H);
  ng.addColorStop(0,'rgba(24,18,44,.34)'); ng.addColorStop(0.45,'rgba(24,18,44,0)');
  g.fillStyle=ng; g.fillRect(0,0,WORLD_W,WORLD_H);
  g.restore();
}

    } else window.__bossIntro=null;

function drawBar(g,x,y,w,h,p,c1,c2){
  g.fillStyle='#160b0b'; g.strokeStyle='#4a2020';
  roundRect(g,x,y,w,h,5); g.fill(); g.stroke();
  if(p>0){ const grad2=g.createLinearGradient(x,y,x,y+h); grad2.addColorStop(0,c2); grad2.addColorStop(1,c1);
    g.fillStyle=grad2; roundRect(g,x+1.5,y+1.5,Math.max(2,(w-3)*p),h-3,4); g.fill(); }
}

/* ================= main loop + watchdog ================= */
let lastT=now(), lastFrame=0;
function frame(){
  const t=now(); let dt=Math.min(50, t-lastT); lastT=t; lastFrame=t;
  // hit-stop: hold every animation clock still for the pause
  if(hitPause>0){ const c=Math.min(dt,hitPause); hitPause-=c; shiftClocks(c); dt=0; }
  fitCanvas();
  const g=ctx;
  g.clearRect(0,0,cv.width,cv.height);
  g.fillStyle='#080604'; g.fillRect(0,0,window.innerWidth,window.innerHeight);
  if(ui.screen==='town'){ updateTown(dt); drawTown(t); }
  else if(ui.screen==='combat'){ drawCombat(t); }
  else if(ui.screen==='map'&&run){ drawMap(t); }
  else { g.fillStyle='#05070d'; g.fillRect(0,0,window.innerWidth,window.innerHeight); }
  drawIris(g);
}
function tick(){ frame(); requestAnimationFrame(tick); }
requestAnimationFrame(tick);
// watchdog: preview panes can report hidden → RAF stalls → run the loop off the interval at ~30fps (draw only, no re-scheduling)
setInterval(()=>{ if(now()-lastFrame>45){ frame(); } }, 33);
/* ================= DOM layer ================= */
const dom=document.getElementById('dom');
const esc2=s=>String(s).replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
const sprURLCache={};
function sprURL(key, scale=4){
  const ck=key+'_'+scale;
  if(sprURLCache[ck]) return sprURLCache[ck];
  const s=SPR[key], c=document.createElement('canvas');
  c.width=s.w*scale; c.height=s.h*scale;
  const g=c.getContext('2d'); g.imageSmoothingEnabled=false;
  g.drawImage(s.img,0,0,c.width,c.height);
  return sprURLCache[ck]=c.toDataURL();
}
const KW_DEFS={
  kindle:['Kindle','Adds Embers. They persist between turns for the rest of this fight.'],
  consume:['Consume','Spends ALL your Embers at once — the effect scales with each Ember spent.'],
  held:['Embers held','Scales with the Embers you hold, without spending them.'],
  weak:['Weak','The target deals 25% less damage. Ticks down each of its turns.'],
  burden:['Burden','Cannot be played. Its weight clogs your pack until the run ends.'],
};
function cardTip(ci){
  const d=CARDS[ci.key];
  const kws=[];
  kws.push(['Weight '+d.w, 'Counts against your pack capacity of '+CAPACITY+' when drawing each turn.']);
  if(cval(ci,'ember')||d.doubleEmbers) kws.push(KW_DEFS.kindle);
  if(d.consume) kws.push(KW_DEFS.consume);
  if(cval(ci,'plusPerEmber')||cval(ci,'embersBonusBlock')) kws.push(KW_DEFS.held);
  if(cval(ci,'weak')) kws.push(KW_DEFS.weak);
  if(d.unplayable) kws.push(KW_DEFS.burden);
  return `<div class="tip">${kws.map(k=>`<div class="kw">${k[0]}</div><div class="kd">${k[1]}</div>`).join('')}</div>`;

function cardHTML(ci, cls='', attrs='', style=''){
  const d=CARDS[ci.key];

  const typec=d.type==='atk'?'atkc':d.type==='skl'?'sklc':'burdenc';
  // ember-scaling cards smolder in hand as Embers rise
  let ign='';
  if(live&&run&&run.combat&&run.combat.embers>0&&(d.consume||cval(ci,'plusPerEmber')||cval(ci,'embersBonusBlock'))){
    ign='ign'; style+=`--ig:${(Math.min(run.combat.embers,6)/6).toFixed(2)};`;
  }
  const icon=SPR['i_'+ci.key]?`<img src="${sprURL('i_'+ci.key,6)}" alt="">`:d.art;
  return `<div class="card ${cls} ${typec} ${ign} ${d.type==='skl'?'skl':''} ${d.type==='burden'?'burden':''} ${d.unplayable?'unplayable-card':''}" ${attrs} style="${style}">

function render(){
  let html='';
  if(ui.screen==='town') html=townDom();
  else if(ui.screen==='map') html=mapDom();
  else if(ui.screen==='combat') html=combatDom();
  if(ui.modal) html+=modalHTML();
  if(ui.tutorial) html+=`<div id="tutmount"></div>`;
  // FLIP: let surviving hand cards glide to their new fan slots
  const oldRects={};
  if(ui.screen==='combat'&&!ui.dealt){
    dom.querySelectorAll('.hand .card[data-play]').forEach(el=>{ oldRects[el.dataset.play]=el.getBoundingClientRect(); });
  }
  dom.innerHTML=html;
  bind();
  if(ui.screen==='combat'){
    dom.querySelectorAll('.hand .card[data-play]').forEach(el=>{
      const old=oldRects[el.dataset.play]; if(!old) return;
      const nr=el.getBoundingClientRect();
      const dx=old.left-nr.left;
      if(Math.abs(dx)>3) el.animate([{transform:`translateX(${dx}px)`},{transform:'translateX(0)'}],{duration:190, easing:'ease-out', composite:'add'});
    });
  }
  if(ui.tutorial) positionTutorial();
  ui.dealt=false;
}

    g.fillStyle='rgba(255,200,110,.1)'; g.beginPath(); g.arc(240,100,52,0,7); g.fill();
    if(kind==='victory'){
      for(let i=0;i<7;i++){ const vx=40+i*56, vy=36-Math.sin(i*0.8)*12;
        g.fillStyle='#ff8f3c'; g.beginPath(); g.arc(vx,vy,3.4,0,7); g.fill();
        g.fillStyle='rgba(255,140,60,.25)'; g.beginPath(); g.arc(vx,vy,10,0,7); g.fill(); }
    }
  } else { // death
    g.fillStyle='#05060c'; g.fillRect(0,0,430,150);
    g.fillStyle='#c7d4ec'; g.beginPath(); g.arc(366,30,15,0,7); g.fill();
    g.fillStyle='#05060c'; g.beginPath(); g.arc(373,26,13,0,7); g.fill();
    g.fillStyle='#0a0e0a'; g.fillRect(0,112,430,38);
    g.strokeStyle='#12180f';
    for(let x=8;x<430;x+=9){ g.beginPath(); g.moveTo(x,116); g.lineTo(x+((x%3)-1)*4, 98); g.stroke(); }
    g.save(); g.translate(210,112); g.rotate(1.25);
    g.fillStyle='#33220e'; g.fillRect(-7,-10,14,18);
    g.fillStyle='rgba(255,180,90,.5)'; g.fillRect(-4,-7,8,10);
    g.restore();
    g.fillStyle='rgba(255,170,80,.1)'; g.beginPath(); g.arc(210,110,34,0,7); g.fill();
  }
  return vignCache[kind]=c.toDataURL();
}

/* ----- codex ----- */
const MECHS=[
  {icon:'⚡', name:'Energy', text:'You get 3 Energy each turn. Cards cost Energy to play (the number in the amber orb). Unspent Energy is lost at end of turn.'},
  {icon:'🎒', name:'Weight & the Pack', text:'Every card has a Weight (blue badge). At the start of your turn you draw toward 5 cards — but stop early if the next card would push your hand past the pack capacity of 10. Heavy cards are powerful, but a heavy deck sees fewer cards each turn. Card-drawn cards obey the same limit.'},
  {icon:'🔥', name:'Embers (Kindle & Consume)', text:'The Lamplighter\'s resource. KINDLE adds Embers, which persist between turns within a fight. CONSUME cards spend ALL your Embers at once and scale with the number spent. Cards that count "Embers held" scale without spending them. Embers reset to 0 between fights.'},
  {icon:'🛡', name:'Block', text:'Block absorbs damage before HP. Your Block resets to 0 at the start of your turn; enemy Block resets when they act.'},
  {icon:'🌫️', name:'Weak', text:'A Weakened enemy deals 25% less damage. Ticks down by 1 each of its turns.'},
  {icon:'💪', name:'Strength', text:'Some enemies grow stronger as the fight drags on, adding to every hit. Kill buffing enemies early — or bring a long fight to a fast end.'},
  {icon:'👁', name:'Intents', text:'Every enemy telegraphs its next move above its head: ⚔ incoming damage (already adjusted for Strength), 🛡 blocking, ↑ buffing. There is no hidden information.'},
  {icon:'🔥', name:'Beacons & Extraction', text:'Twice per road you reach a Beacon (+5 HP). Light it and you walk home, banking EVERYTHING in the wagon. Press on and rewards grow (~×1.7 past the first beacon) — but if you die, the wagon spills: you keep only 25% of materials and every rescued villager is lost.'},
  {icon:'🕊️', name:'Escorts & Burdens', text:'Rescuing a villager adds an Escort card to your deck — weight 2, unplayable — that clogs your pack for the rest of the run. Some events add junk burdens too. Villagers only settle in town if you extract alive.'},
  {icon:'🛒', name:'The Wagon', text:'Everything you earn on the road rides in the wagon: materials, and any villagers walking beside it. The wagon is only YOURS once you extract.'},
  {icon:'⛺', name:'Camps', text:'A safe fire on the road. Rest (heal 15 HP) or Hone (permanently upgrade one card for this run).'},
  {icon:'⚒️', name:'The Forge (town)', text:'Built with 30 materials once Maren is rescued and home. Each expedition starts with one card of your choice upgraded.'},
  {icon:'📚', name:'The Library (town)', text:'Built with 20 materials. Adds 5 rare, stranger cards to the wilds\' reward pool.'},
];
function codexHTML(){
  const tab=ui.codexTab;
  let body='';
  if(tab==='mech'){
    body=`<div class="codexlist">${MECHS.map(m=>`<div class="codexentry"><div class="cicon">${m.icon}</div><div><div class="cename">${m.name}</div><div class="cetext">${m.text}</div></div></div>`).join('')}</div>`;
  } else if(tab==='foes'){
    body=`<div class="codexlist">${Object.keys(ENEMIES).map(k=>{
      const e=ENEMIES[k];
      return `<div class="codexentry"><img src="${sprURL(e.spr,4)}"><div>
        <div class="cename">${e.name}${e.elite?' · ELITE':''}${e.boss?' · BOSS':''}</div>
        <div class="cetext" style="font-style:italic">${e.lore}</div>
        <div class="cetext">${e.pattern}</div>
        <div class="cestat">${e.hp} HP</div></div></div>`;
    }).join('')}</div>`;
  } else {
    const all=Object.keys(CARDS);
    body=`<div class="cardrow">${all.map(k=>cardHTML(mk(k),'mini')).join('')}</div>`;
  }
  return ovl(`<h2>📖 The Codex</h2>
    <div class="codextabs">
      <div class="codextab ${tab==='mech'?'on':''}" data-tab="mech">Mechanics</div>
      <div class="codextab ${tab==='foes'?'on':''}" data-tab="foes">Enemies</div>
      <div class="codextab ${tab==='cards'?'on':''}" data-tab="cards">Cards</div>
    </div>${body}
    <button class="btn cold" style="margin-top:10px" data-act="closemodal">Close</button>`,'wide');
}

/* ----- tutorial ----- */
const TUT_STEPS=[
  {t:'<b>Welcome to the Proving Ground, Lamplighter.</b> Out here, the light you carry is the only rule that matters. Let\'s learn to fight for it.', require:'next'},
  {t:'A <b>Mire Wolf</b>. Above its head is its <b>intent</b> — exactly what it will do on its turn. ⚔ 6 means a 6-damage bite is coming. Nothing in the wilds hides its plans.', anchor:'enemy', require:'next'},
  {t:'Your <b>Energy</b>. You get <b>3</b> every turn, and cards cost Energy to play — the number on each card\'s amber orb.', anchor:'.orb', require:'next'},
  {t:'Your <b>pack</b>. Every card has a <b>Weight</b> (blue badge). Each turn you draw toward 5 cards — but never past <b>10 weight</b>. Heavy cards hit hard and crowd everything else out.', anchor:'.weightbar', require:'next'},
  {t:'Start simple: play <b>Lantern Sweep</b> — 1 Energy, 5 damage.', anchor:'card:sweep', require:'play:sweep'},
  {t:'Now <b>Light the Wick</b>. It costs nothing, <b>Kindles an Ember</b>, and draws a card. Embers are the Lamplighter\'s fuel — watch them orbit your lantern.', anchor:'card:wick', require:'play:wick'},
  {t:'<b>Flarecall</b> <i>consumes</i> every Ember you hold: 8 damage +4 per Ember. Your Ember makes it 12 — enough to finish the wolf. <b>Burn it down.</b>', anchor:'card:flarecall', require:'play:flarecall'},
  {t:'<b>Well fought.</b> One last thing: on the road you\'ll reach <b>Beacons</b>. Light one and you walk home, keeping everything in the wagon. Press on and the loot grows — but die, and the wagon spills. Greed and light, Lamplighter. Balance them.', require:'finish'},
];
function startTutorial(){
  ui.modal=null;
  run={hp:MAX_HP, maxHp:MAX_HP, deck:STARTER_DECK.map(k=>mk(k)), row:-1, chosen:[],
       wagon:{materials:0,smith:false,villagers:0}, combat:null, depthPressed:0, tutorial:true};
  startCombat(['wolf'],'tutorial');
  const c=run.combat;
  c.hand=[]; c.disc=[];
  const rest=STARTER_DECK.slice(5).map(k=>mk(k));
  c.draw=[...rest, mk('flarecall'), mk('wick'), mk('cloak'), mk('sweep'), mk('sweep')];
  drawToHand();
  ui.tutorial={step:0};
  ui.log='';
  render();
}
function advanceTut(evt){
  const st=TUT_STEPS[ui.tutorial.step];
  if(st&&st.require===evt){ ui.tutorial.step++; }
}
function nudgeTut(){ ui.log='(follow the lesson — the highlighted move)'; render(); }
function finishTutorialFight(){
  ui.tutorial={step:TUT_STEPS.length-1};
  ui.log='';
  render();
}
function endTutorial(){
  town.tutorialDone=true; saveTown();
  run=null; ui.tutorial=null; ui.targeting=null;
  ui.screen='town'; ui.modal=null;
  render();
}
function positionTutorial(){
  const mount=document.getElementById('tutmount'); if(!mount) return;
  const st=TUT_STEPS[ui.tutorial.step]; if(!st){ return; }
  let ring='', bx=window.innerWidth/2-165, by=120;
  let target=null;
  if(st.anchor==='enemy'){
    const ep=enemyPos(0), sp=SPR.wolf;
    const tl=worldToClient(ep.x-sp.w*4/2-20, ep.y-sp.h*4-90);
    const br=worldToClient(ep.x+sp.w*4/2+20, ep.y+20);
    target={left:tl.x, top:tl.y, width:br.x-tl.x, height:br.y-tl.y};
  } else if(st.anchor&&st.anchor.startsWith('card:')){
    const key=st.anchor.slice(5);
    const el=[...document.querySelectorAll('[data-play]')].find(e2=>{
      const ci=run.combat.hand.find(x=>x.iid===Number(e2.dataset.play)); return ci&&ci.key===key;
    });
    if(el) target=el.getBoundingClientRect();
  } else if(st.anchor){
    const el=document.querySelector(st.anchor);
    if(el) target=el.getBoundingClientRect();
  }
  if(target){
    ring=`<div class="tutring" style="left:${target.left-8}px; top:${target.top-8}px; width:${target.width+16}px; height:${target.height+16}px;"></div>`;
    bx=Math.max(14, Math.min(window.innerWidth-350, target.left+target.width/2-165));
    by=target.top-190;
    if(by<70) by=target.top+target.height+22;
    if(by>window.innerHeight-220) by=window.innerHeight/2-100;
  }
  const showBtn=st.require==='next'||st.require==='finish';
  mount.innerHTML=`${ring}<div class="tutbox" style="left:${bx}px; top:${by}px;">
    <div class="tstep">LESSON ${ui.tutorial.step+1} / ${TUT_STEPS.length}</div>
    <div class="ttext">${st.t}</div>
    ${showBtn?`<button class="btn" data-act="${st.require==='finish'?'tut-finish':'tut-next'}">${st.require==='finish'?'Return to Town':'Continue'}</button>`:''}
  </div>`;
  mount.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click',()=>act(el.dataset.act)));
}

/* ----- bind + actions ----- */
function bind(){
  dom.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click',()=>act(el.dataset.act)));
  dom.querySelectorAll('[data-node]').forEach(el=>el.addEventListener('click',()=>{ if(!ui.modal) enterNode(el.dataset.node); }));
  dom.querySelectorAll('[data-play]').forEach(el=>el.addEventListener('click',()=>{
    const iid=Number(el.dataset.play);
    const c=run&&run.combat;
    if(c&&!c.busy&&!c.over){
      const ci=c.hand.find(x=>x.iid===iid);
      if(ci&&!CARDS[ci.key].unplayable&&cval(ci,'cost')<=c.energy){
        const alive=livingEnemies(), d=CARDS[ci.key];
        if(!(d.type==='atk'&&!d.aoe&&alive.length>1)) flyCard(el);
      }
    }
    playCard(iid);
  }));
  dom.querySelectorAll('[data-forge]').forEach(el=>el.addEventListener('click',()=>{
    const ci=run.deck.find(x=>x.iid===Number(el.dataset.forge));
    if(ci) ci.up=true;
    ui.modal=null; render();
  }));
  dom.querySelectorAll('[data-pickcard]').forEach(el=>el.addEventListener('click',()=>{
    run.deck.push(mk(ui.modal.picks[Number(el.dataset.pickcard)]));
    ui.modal=null; render();
  }));
  dom.querySelectorAll('[data-upgrade]').forEach(el=>el.addEventListener('click',()=>{
    const ci=run.deck.find(x=>x.iid===Number(el.dataset.upgrade));
    if(ci) ci.up=true;
    ui.modal=null; render();
  }));
  dom.querySelectorAll('[data-event]').forEach(el=>el.addEventListener('click',()=>{
    ui.modal.ev.choices[Number(el.dataset.event)].fx();
    ui.modal=null; render();
  }));
  dom.querySelectorAll('[data-build]').forEach(el=>el.addEventListener('click',()=>{
    const k=el.dataset.build, L=LOTS[k];
    if(town.materials>=L.cost&&!(L.needsSmith&&!town.villagers.smith)){
      town.materials-=L.cost; town.buildings[k]=true; saveTown();
    }
    ui.modal=null; render();
  }));
  dom.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{ ui.codexTab=el.dataset.tab; render(); }));
}
function flyCard(el){
  const r=el.getBoundingClientRect();
  const clone=el.cloneNode(true);
  clone.classList.add('flycard'); clone.classList.remove('dealt','playable');
  clone.style.left=r.left+'px'; clone.style.top=r.top+'px'; clone.style.margin='0'; clone.style.setProperty('--r','0deg'); clone.style.setProperty('--ty','0px');
  document.body.appendChild(clone);
  requestAnimationFrame(()=>{
    clone.style.left=(window.innerWidth*0.55)+'px';
    clone.style.top='30%';
    clone.style.opacity='0';
    clone.style.transform='scale(.55) rotate(10deg)';
  });
  setTimeout(()=>clone.remove(), 420);
}
function act(a){
  switch(a){
    case 'gate-go': ui.modal=null; render(); withIris(newRun); break;
    case 'tut-start': ui.modal=null; render(); withIris(startTutorial); break;
    case 'tut-next': ui.tutorial.step++; render(); break;
    case 'tut-finish': withIris(endTutorial); break;
    case 'codex': ui.modal={kind:'codex'}; render(); break;
    case 'reset':
      if(confirm('Burn it all down and start a fresh save?')){
        localStorage.removeItem(SAVE_KEY); town=defaultTown(); run=null;
        ui={screen:'town', modal:null, targeting:null, log:'', dealt:false, tutorial:null, codexTab:'mech'};
        render();
      }
      break;
    case 'endturn': endTurn(); break;
    case 'viewdeck': ui.modal={kind:'viewdeck'}; render(); break;
    case 'pile-draw': ui.modal={kind:'pile', which:'draw'}; render(); break;
    case 'pile-disc': ui.modal={kind:'pile', which:'disc'}; render(); break;
    case 'closemodal': ui.modal=null; render(); break;
    case 'closemodal-camp': campRest(); break;
    case 'camp-rest': campRest(); break;
    case 'camp-forge': ui.modal={kind:'campUpgrade'}; render(); break;
    case 'rescue-fight': ui.modal=null; render(); withIris(startRescueFight); break;
    case 'rescue-leave': ui.modal=null; render(); break;
    case 'beacon-home': ui.modal=null; extractHome(false); break;
    case 'beacon-press': run.depthPressed++; ui.modal=null; render(); break;
    case 'skipcard': ui.modal=null; render(); break;
    case 'townreturn': withIris(backToTown); break;
  }
}

/* ================= debug ================= */
window.__dbg={
  state:()=>({screen:ui.screen, modal:ui.modal&&ui.modal.kind, tut:ui.tutorial&&ui.tutorial.step,
    town:JSON.parse(JSON.stringify(town)),
    player:{x:Math.round(player.x), y:Math.round(player.y)},
    run:run&&{hp:run.hp, row:run.row, wagon:run.wagon, deck:run.deck.length,
      combat:run.combat&&{enemies:run.combat.enemies.map(e=>({k:e.key,hp:e.hp})), hand:run.combat.hand.map(c=>c.key),
        energy:run.combat.energy, embers:run.combat.embers, weight:handWeight(), busy:run.combat.busy}}}),
  winFight:()=>{ if(run&&run.combat){ run.combat.enemies.forEach(e=>{e.hp=0; e.diedAt=e.diedAt||now();}); checkVictory(); render(); } },
  hurtSelf:n=>{ if(run){ run.hp=Math.max(0,run.hp-n); render(); } },
  addMat:n=>{ town.materials+=n; saveTown(); render(); },
  play:key=>{ if(run&&run.combat){ const ci=run.combat.hand.find(c=>c.key===key); if(ci) playCard(ci.iid); } },
  endTurn:()=>endTurn(),
  node:t=>enterNode(t),
  teleport:(x,y)=>{ player.x=x; player.y=y; },
  interact:a=>townInteract(a),
  tut:()=>startTutorial(),
};

render();

</script>
